name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # One secret per network: map the same value to VITE_* (client) and APTOS_* (SSR)
    # so preview tests do not split traffic across two API key identities.
    env:
      VITE_APTOS_MAINNET_API_KEY: ${{ secrets.APTOS_MAINNET_API_KEY }}
      APTOS_MAINNET_API_KEY: ${{ secrets.APTOS_MAINNET_API_KEY }}
      VITE_APTOS_TESTNET_API_KEY: ${{ secrets.APTOS_TESTNET_API_KEY }}
      APTOS_TESTNET_API_KEY: ${{ secrets.APTOS_TESTNET_API_KEY }}
      VITE_APTOS_DEVNET_API_KEY: ${{ secrets.APTOS_DEVNET_API_KEY }}
      APTOS_DEVNET_API_KEY: ${{ secrets.APTOS_DEVNET_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, test, and build
        run: pnpm ci:verify

      - name: Install Playwright Chromium
        run: pnpm test:e2e:install

      - name: Playwright smoke tests
        run: pnpm exec playwright test

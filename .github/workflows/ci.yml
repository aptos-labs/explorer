name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # One secret per network: map the same value to VITE_* (client) and APTOS_* (SSR)
    # so preview tests do not split traffic across two API key identities.
    env:
      VITE_APTOS_MAINNET_API_KEY: ${{ secrets.APTOS_MAINNET_API_KEY }}
      APTOS_MAINNET_API_KEY: ${{ secrets.APTOS_MAINNET_API_KEY }}
      VITE_APTOS_TESTNET_API_KEY: ${{ secrets.APTOS_TESTNET_API_KEY }}
      APTOS_TESTNET_API_KEY: ${{ secrets.APTOS_TESTNET_API_KEY }}
      VITE_APTOS_DEVNET_API_KEY: ${{ secrets.APTOS_DEVNET_API_KEY }}
      APTOS_DEVNET_API_KEY: ${{ secrets.APTOS_DEVNET_API_KEY }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, test, and build
        run: pnpm ci:verify

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      # Playwright smoke tests are intentionally excluded from CI — they require
      # installing a full Chromium binary and running against a vite preview build,
      # making them too expensive for per-PR runs. Run them locally with:
      #   pnpm test:e2e:install && pnpm test:e2e
